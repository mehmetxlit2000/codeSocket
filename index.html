<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anlık Kod Paylaşım Paneli (WebSocket / Firebase)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col">

    <header class="bg-slate-800 border-b border-slate-700 p-4 shadow-md flex justify-between items-center max-w-5xl w-full mx-auto mt-4 rounded-xl">
        <div class="flex items-center space-x-2">
            <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse" id="status-dot"></span>
            <h1 class="font-bold text-lg tracking-wide">Canlı Kod Senkronizasyonu</h1>
        </div>
        <div class="flex items-center space-x-2">
            <button id="copy-btn" onclick="copyCode()" class="bg-slate-700 hover:bg-slate-600 text-white font-medium px-4 py-2 rounded-lg transition duration-200 flex items-center space-x-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                <span id="copy-text">Kopyala</span>
            </button>
            <button onclick="downloadPythonFile()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-4 py-2 rounded-lg transition duration-200 flex items-center space-x-2 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                <span>s.py İndir</span>
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 flex flex-col">
        <div class="flex-1 bg-slate-800 border border-slate-700 rounded-xl shadow-xl flex flex-col overflow-hidden">
            <div class="bg-slate-700/50 px-4 py-2 border-b border-slate-700 text-xs text-slate-400 font-mono flex justify-between">
                <span>Kod Alanı (Yazdığınız anda diğer cihazlarda görünür)</span>
                <span id="char-count">0 karakter</span>
            </div>
            <textarea id="code-input" 
                class="flex-1 w-full bg-slate-900/90 text-emerald-400 font-mono p-4 resize-none focus:outline-none focus:ring-0 text-sm md:text-base leading-relaxed" 
                placeholder="# Kodunuzu buraya yazın veya yapıştırın..."></textarea>
        </div>
    </main>

    <footer class="text-center p-4 text-xs text-slate-500">
        Firebase Realtime Database ile anlık senkronizasyon aktif.
    </footer>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBV7jtoXPBcPdclcBseOK39wJsSXUxLpg4",
            databaseURL: "https://atamossocket-default-rtdb.firebaseio.com",
            projectId: "atamossocket"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const codeRef = db.ref('sharedCode');

        const codeInput = document.getElementById('code-input');
        const charCount = document.getElementById('char-count');
        const statusDot = document.getElementById('status-dot');
        const copyText = document.getElementById('copy-text');

        let isRemoteUpdate = false;

        codeRef.on('value', (snapshot) => {
            const serverCode = snapshot.val();
            if (serverCode !== null && serverCode !== codeInput.value) {
                isRemoteUpdate = true;
                codeInput.value = serverCode;
                updateCharCount(serverCode);
                isRemoteUpdate = false;
            }
            statusDot.classList.remove('bg-rose-500');
            statusDot.classList.add('bg-emerald-500');
        }, (error) => {
            console.error("Bağlantı hatası:", error);
            statusDot.classList.remove('bg-emerald-500');
            statusDot.classList.add('bg-rose-500');
        });

        codeInput.addEventListener('input', (e) => {
            if (isRemoteUpdate) return;
            const currentText = e.target.value;
            codeRef.set(currentText);
            updateCharCount(currentText);
        });

        function updateCharCount(text) {
            charCount.innerText = `${text.length} karakter`;
        }

        // Tek hamlede kopyalama fonksiyonu
        function copyCode() {
            codeInput.select();
            codeInput.setSelectionRange(0, 99999); // Mobil uyumluluk için
            navigator.clipboard.writeText(codeInput.value).then(() => {
                copyText.innerText = "Kopyalandı!";
                setTimeout(() => {
                    copyText.innerText = "Kopyala";
                }, 2000);
            }).catch(err => {
                console.error("Kopyalama başarısız:", err);
            });
        }

        function downloadPythonFile() {
            const codeContent = codeInput.value;
            const blob = new Blob([codeContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 's.py';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
